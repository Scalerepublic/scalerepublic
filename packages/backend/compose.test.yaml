services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scalerepublic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/scalerepublic
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "bunx drizzle-kit migrate && bun test"
